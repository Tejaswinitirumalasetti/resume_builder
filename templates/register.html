{% extends 'base.html' %}

{% block content %}

<div class="container mt-5">
    <div class="row align-items-center">

        <!-- Register Form -->
        <div class="col-12 col-lg-6 order-1 order-lg-1 mb-4">
            <div class="card shadow-lg border-0">
                <div class="card-header bg-success text-white text-center">
                    <h3>Create Account</h3>
                    <p class="mb-0">Build your professional resume</p>
                </div>

                <div class="card-body p-4">

                    <form method="POST">
                        {% csrf_token %}

                        <div class="mb-3">
                            <label class="form-label fw-bold">Username</label>
                            <input type="text" name="username" class="form-control form-control-lg" placeholder="Enter username" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-bold">Email</label>
                            <input type="email" name="email" class="form-control form-control-lg" placeholder="Enter email" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-bold">Password</label>
                            <input type="password" name="password" class="form-control form-control-lg" placeholder="Enter password" required>
                        </div>

                        <button type="submit" class="btn btn-success btn-lg w-100">
                            Register
                        </button>

                    </form>

                </div>
            </div>
        </div>


        <!-- Image Section -->
        <div class="col-12 col-lg-6 text-center order-2 order-lg-2">
            <img src="https://i.pinimg.com/originals/09/aa/cc/09aaccb12fe37eef6d9a3ad3cb57e338.gif"
                 class="img-fluid"
                 style="max-height:250px;"
                 alt="Register Illustration">

            <h4 class="mt-3 text-success">Create Your Resume Easily</h4>
            <p class="text-muted">
                Register now and generate a professional resume in minutes.
            </p>
        </div>

    </div>
</div>

{% endblock %}
